name: Hlo workflow    # this is name for workflow 
on:
  push:
    branches:
      - main
      - dev
      - test
jobs:     # these are jobs inside the workflow
  greet:    # this is name of job  
    runs-on: ubuntu-latest  # this is gitlab runner
    steps:
      - name: say hello to user
        run: echo "hello dosto"
      - name: say hello to username
        run: echo "hello $USER"
